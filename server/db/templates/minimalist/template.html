    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* Vertical handwritten names on the left */
  .couple-names {
    position: absolute;
    top: 50%;
    left: 14%;
    transform: translate(-50%, -50%) rotate(-90deg);
    transform-origin: center;
    white-space: nowrap;
    font-family: 'Homemade Apple', cursive;
    font-size: clamp(2rem, 6.5vw, 4rem);
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.02em;
  }

  /* Right-side text block */
  .details {
    position: absolute;
    top: 48%;
    right: 6%;
    width: 48%;
    text-align: center;
    color: #1a1a1a;
    font-family: 'Cormorant Garamond', serif;
  }

  .wording {
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.35rem);
    font-weight: 300;
    line-height: 1.4;
    letter-spacing: 0.02em;
    white-space: pre-line;
  }

  .event-date {
    margin-top: clamp(1.2rem, 3vw, 2rem);
    font-size: clamp(0.9rem, 1.8vw, 1.2rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .venue-name {
    margin-top: clamp(1.2rem, 3vw, 2rem);
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.3rem);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .venue-address {
    margin-top: 0.5rem;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.3rem);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .venue-map {
    margin-top: clamp(0.5rem, 1.5vw, 1rem);
  }
  .venue-map a {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: #1a1a1a;
    letter-spacing: 0.15em;
    text-decoration: none;
    border-bottom: 1px solid rgba(26, 26, 26, 0.4);
    padding-bottom: 1px;
  }

  .description {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 300;
    line-height: 1.6;
    letter-spacing: 0.02em;
    color: #1a1a1a;
    margin-top: clamp(1rem, 2.5vw, 1.5rem);
    white-space: pre-line;
  }
</style>
</head>
<body>
  <div class="invitation">
    <div class="couple-names"><span class="couple-name">{{coupleName1}}</span> + <span class="couple-name">{{coupleName2}}</span></div>

    <div class="details">
      <p class="wording">{{wording}}</p>
      <p class="event-date">{{date}}</p>
      <p class="venue-name">{{venue}}</p>
      <p class="venue-address">{{venueAddress}}</p>
      {{#if venueMapUrl}}
      <p class="venue-map"><a href="{{venueMapUrl}}" target="_blank" rel="noopener noreferrer">{{t:templates.viewOnMap}}</a></p>
      {{/if}}
      {{#if description}}
      <p class="description">{{description}}</p>
      {{/if}}
    </div>

  </div>
</body>
</html>
