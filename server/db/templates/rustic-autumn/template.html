<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: #fdf6ee;
    color: #4a3728;
    min-height: 100vh;
  }

  .invitation {
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 40px;
    text-align: center;
    position: relative;
  }

  .border-frame {
    border: 2px solid #c4956a;
    padding: 50px 40px;
    position: relative;
  }

  .border-frame::before,
  .border-frame::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: #b8834a;
  }

  .border-frame::before {
    top: 8px;
    left: 8px;
    border-top: 3px solid #b8834a;
    border-left: 3px solid #b8834a;
  }

  .border-frame::after {
    bottom: 8px;
    right: 8px;
    border-bottom: 3px solid #b8834a;
    border-right: 3px solid #b8834a;
  }

  .leaf-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 28px 0;
    color: #c4956a;
    font-size: 20px;
  }

  .leaf-divider .line {
    width: 60px;
    height: 1px;
    background: #c4956a;
  }

  .together {
    font-family: 'Lora', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #9a7350;
    margin-bottom: 20px;
  }

  .couple-name {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #5c3d20;
    line-height: 1.2;
  }

  .ampersand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: #b8834a;
    margin: 8px 0;
  }

  .event-date {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #7a5c3e;
    margin-top: 8px;
  }

  .wording {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.8;
    color: #6b5241;
    max-width: 420px;
    margin: 0 auto;
    white-space: pre-line;
  }

  .venue-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #5c3d20;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .venue-name {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: #6b5241;
    margin-bottom: 4px;
  }

  .venue-address {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: #9a7350;
  }

  .venue-map {
    margin-top: 10px;
  }
  .venue-map a {
    font-family: 'Lora', serif;
    font-size: 12px;
    color: #b8834a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid rgba(184, 131, 74, 0.4);
    padding-bottom: 2px;
  }

  .description {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.8;
    color: #6b5241;
    max-width: 420px;
    margin: 0 auto;
    white-space: pre-line;
  }

  .footer-note {
    font-family: 'Lora', serif;
    font-size: 12px;
    color: #b8a089;
    margin-top: 30px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="invitation">
    <div class="border-frame">
      <p class="together">{{t:templates.together}}</p>

      <h1 class="couple-name">{{coupleName1}}</h1>
      <p class="ampersand">&amp;</p>
      <h1 class="couple-name">{{coupleName2}}</h1>

      <div class="leaf-divider">
        <span class="line"></span>
        <span>&#127809;</span>
        <span class="line"></span>
      </div>

      <p class="event-date">{{date}}</p>

      <div class="leaf-divider">
        <span class="line"></span>
        <span>&#127809;</span>
        <span class="line"></span>
      </div>

      <div class="wording">{{wording}}</div>

      <div class="leaf-divider">
        <span class="line"></span>
        <span>&#10047;</span>
        <span class="line"></span>
      </div>

      <div class="venue-section">
        <h3>{{t:templates.venue}}</h3>
        <p class="venue-name">{{venue}}</p>
        <p class="venue-address">{{venueAddress}}</p>
        {{#if venueMapUrl}}
        <p class="venue-map"><a href="{{venueMapUrl}}" target="_blank" rel="noopener noreferrer">{{t:templates.viewOnMap}}</a></p>
        {{/if}}
      </div>

      {{#if description}}
      <div class="leaf-divider">
        <span class="line"></span>
        <span>&#10047;</span>
        <span class="line"></span>
      </div>
      <div class="description">{{description}}</div>
      {{/if}}

      <p class="footer-note">{{t:templates.joyfullyRequest}}</p>
    </div>
  </div>
</body>
</html>
