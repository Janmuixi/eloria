<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #0d0b12;
    color: #e8e0d0;
    min-height: 100vh;
  }

  .invitation {
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 40px;
    text-align: center;
    position: relative;
  }

  .gold-border {
    border: 1px solid #c9a84c;
    padding: 56px 44px;
    position: relative;
    background: linear-gradient(180deg, rgba(201, 168, 76, 0.04) 0%, rgba(13, 11, 18, 0) 50%, rgba(201, 168, 76, 0.04) 100%);
  }

  .gold-border::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    pointer-events: none;
  }

  .ornament {
    color: #c9a84c;
    font-size: 28px;
    margin: 24px 0;
    letter-spacing: 16px;
    line-height: 1;
  }

  .together {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: #a89a80;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  .couple-name {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 500;
    color: #c9a84c;
    line-height: 1.2;
    letter-spacing: 0.05em;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
  }

  .ampersand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 36px;
    color: #a89a80;
    margin: 10px 0;
  }

  .gold-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 32px auto;
  }

  .event-date {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 400;
    color: #d4c5a9;
    letter-spacing: 0.2em;
  }

  .wording {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    line-height: 1.9;
    color: #b8a88e;
    max-width: 420px;
    margin: 0 auto;
    white-space: pre-line;
  }

  .venue-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 500;
    color: #c9a84c;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .venue-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #e0d5c0;
    margin-bottom: 6px;
  }

  .venue-address {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: #8a7d6a;
  }

  .footer-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: #6b6050;
    margin-top: 36px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="invitation">
    <div class="gold-border">
      <div class="ornament">&#10022; &#10022; &#10022;</div>

      <p class="together">{{t:templates.together}}</p>

      <h1 class="couple-name">{{coupleName1}}</h1>
      <p class="ampersand">&amp;</p>
      <h1 class="couple-name">{{coupleName2}}</h1>

      <div class="gold-line"></div>

      <p class="event-date">{{date}}</p>

      <div class="gold-line"></div>

      <div class="wording">{{wording}}</div>

      <div class="gold-line"></div>

      <div class="venue-section">
        <h3>{{t:templates.venue}}</h3>
        <p class="venue-name">{{venue}}</p>
        <p class="venue-address">{{venueAddress}}</p>
      </div>

      <p class="footer-note">{{t:templates.honourOfYourPresence}}</p>

      <div class="ornament">&#10022; &#10022; &#10022;</div>
    </div>
  </div>
</body>
</html>
